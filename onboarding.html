<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VOID RUNNER — Začátek</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000008;
  overflow: hidden;
  font-family: 'Rajdhani', sans-serif;
  user-select: none;
  -webkit-user-select: none;
  color: #fff;
}

canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

/* ── LETTERBOX ── */
.letterbox-top, .letterbox-bot {
  position: fixed; left: 0; width: 100%;
  background: #000; z-index: 50;
  transition: height 1.8s cubic-bezier(0.4,0,0.2,1);
}
.letterbox-top { top: 0; height: 12vh; }
.letterbox-bot { bottom: 0; height: 12vh; }
.letterbox-top.open { height: 0; }
.letterbox-bot.open { height: 0; }

/* ── SCREENS ── */
.screen {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 20; opacity: 0;
  transition: opacity 1.2s ease;
  pointer-events: none;
}
.screen.active { opacity: 1; pointer-events: all; }

/* ── INTRO SCREEN ── */
#screen-intro { justify-content: flex-end; padding-bottom: 18vh; }

#story-text {
  max-width: 600px; text-align: center;
  font-family: 'EB Garamond', serif; font-size: clamp(15px, 2vw, 19px);
  color: #e8d5a0; line-height: 1.9; letter-spacing: 0.5px;
  text-shadow: 0 0 40px #ff8c0033;
  min-height: 120px;
}

#logo-reveal {
  margin-top: 36px;
  font-family: 'Orbitron', monospace; font-weight: 900;
  font-size: clamp(36px, 6vw, 72px);
  letter-spacing: 14px; color: #fff;
  text-shadow: 0 0 30px #ff8c0088, 0 0 80px #ff8c0033, 0 0 160px #ff8c0011;
  opacity: 0; transform: translateY(20px);
  transition: opacity 1.5s ease, transform 1.5s ease;
}
#logo-reveal.show { opacity: 1; transform: translateY(0); }

#logo-sub {
  font-family: 'Rajdhani', sans-serif; font-size: 13px;
  color: #ffffff33; letter-spacing: 10px;
  margin-top: 8px; opacity: 0;
  transition: opacity 1.5s ease 0.5s;
}
#logo-sub.show { opacity: 1; }

#btn-continue {
  margin-top: 48px;
  font-family: 'Orbitron', monospace; font-size: 13px;
  color: #ff8c00; letter-spacing: 5px; border: none;
  background: transparent; cursor: pointer; padding: 12px 32px;
  border: 1px solid #ff8c0044; border-radius: 2px;
  opacity: 0; transition: opacity 1s ease, border-color 0.3s, color 0.3s;
  animation: pulse 2s ease-in-out infinite;
}
#btn-continue.show { opacity: 1; }
#btn-continue:hover { border-color: #ff8c00; color: #fff; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

/* ── NAME SCREEN ── */
#screen-name { gap: 20px; }

.screen-title {
  font-family: 'Orbitron', monospace; font-size: clamp(18px, 3vw, 28px);
  font-weight: 900; letter-spacing: 6px; color: #fff;
  text-shadow: 0 0 20px #ff8c0066;
  margin-bottom: 8px;
}
.screen-sub {
  font-size: 13px; color: #ffffff44; letter-spacing: 4px;
  margin-bottom: 32px;
}

#name-input {
  background: transparent; border: none;
  border-bottom: 2px solid #ff8c0066;
  font-family: 'Orbitron', monospace; font-size: 28px;
  font-weight: 700; color: #ff8c00; letter-spacing: 6px;
  text-align: center; width: 320px; padding: 8px 16px;
  outline: none; caret-color: #ff8c00;
  transition: border-color 0.3s;
}
#name-input:focus { border-color: #ff8c00; }
#name-input::placeholder { color: #ffffff22; font-size: 16px; letter-spacing: 8px; }

#btn-name-next {
  margin-top: 24px;
  font-family: 'Orbitron', monospace; font-size: 12px;
  color: #000; background: #ff8c00; border: none;
  letter-spacing: 4px; padding: 14px 40px; cursor: pointer;
  border-radius: 2px; transition: background 0.3s, transform 0.15s;
}
#btn-name-next:hover { background: #ffaa00; transform: scale(1.03); }

/* ── SHIP SELECT CANVAS ── */
#ship-canvas {
  display: block; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; z-index: 5;
  pointer-events: none;
}
#ship-canvas.active { pointer-events: all; }

#ship-select-title {
  position: fixed; top: 8vh; left: 0; width: 100%; text-align: center;
  font-family: 'Orbitron', monospace; font-weight: 900;
  font-size: clamp(18px, 3.5vw, 28px); letter-spacing: 8px; color: #fff;
  text-shadow: 0 0 20px #ff8c0066; z-index: 25;
  opacity: 0; transition: opacity 0.8s ease; pointer-events: none;
}
#ship-select-title.show { opacity: 1; }
#ship-select-sub {
  position: fixed; top: calc(8vh + clamp(28px,4.5vw,42px)); left: 0; width: 100%;
  text-align: center; font-size: 12px; color: #ffffff33; letter-spacing: 5px;
  z-index: 25; opacity: 0; transition: opacity 0.8s ease 0.3s; pointer-events: none;
}
#ship-select-sub.show { opacity: 1; }

#btn-fly {
  position: fixed; bottom: 12vh; left: 50%; transform: translateX(-50%);
  font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 900;
  color: #000; background: linear-gradient(135deg, #ff8c00, #ffcc00);
  border: none; letter-spacing: 6px; padding: 16px 52px;
  cursor: pointer; border-radius: 2px; z-index: 30;
  transition: transform 0.15s, box-shadow 0.3s, opacity 0.5s;
  opacity: 0; pointer-events: none;
  box-shadow: 0 0 30px #ff8c0066;
}
#btn-fly.ready { opacity: 1; pointer-events: all; }
#btn-fly:hover { transform: translateX(-50%) scale(1.04); box-shadow: 0 0 50px #ff8c00aa; }

/* ── MODE SCREEN ── */
#screen-mode { gap: 16px; }

.modes-row {
  display: flex; gap: 20px; margin-top: 8px;
}

.mode-card {
  width: 200px; padding: 28px 20px;
  border: 1px solid #ffffff11; border-radius: 4px;
  background: #ffffff05; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  transition: border-color 0.3s, background 0.3s, transform 0.2s;
  position: relative;
}
.mode-card:hover, .mode-card.selected {
  border-color: var(--mode-color);
  background: color-mix(in srgb, var(--mode-color) 8%, transparent);
  transform: translateY(-4px);
}
.mode-card .mode-icon { font-size: 36px; }
.mode-card .mode-name {
  font-family: 'Orbitron', monospace; font-size: 13px;
  font-weight: 700; letter-spacing: 3px; color: var(--mode-color);
}
.mode-card .mode-desc {
  font-size: 12px; color: #ffffff55; text-align: center;
  letter-spacing: 1px; line-height: 1.7;
}
.mode-card.selected::after {
  content: '✓'; position: absolute; top: 10px; right: 14px;
  font-size: 14px; color: var(--mode-color);
}

#btn-launch {
  margin-top: 20px;
  font-family: 'Orbitron', monospace; font-size: 14px;
  font-weight: 900; color: #000;
  background: linear-gradient(135deg, #ff8c00, #ffcc00);
  border: none; letter-spacing: 6px; padding: 18px 56px;
  cursor: pointer; border-radius: 2px;
  transition: transform 0.15s, box-shadow 0.3s;
  opacity: 0.4; pointer-events: none;
  box-shadow: 0 0 0px #ff8c0000;
}
#btn-launch.ready {
  opacity: 1; pointer-events: all;
  box-shadow: 0 0 30px #ff8c0066;
}
#btn-launch.ready:hover { transform: scale(1.04); box-shadow: 0 0 50px #ff8c00aa; }

/* ── BACK BUTTONS ── */
.btn-back {
  position: fixed; top: 14vh; left: 32px; z-index: 30;
  font-family: 'Orbitron', monospace; font-size: 11px;
  color: #ffffff44; letter-spacing: 3px; cursor: pointer;
  background: transparent; border: none; padding: 8px;
  transition: color 0.3s; display: none;
}
.btn-back:hover { color: #ff8c00; }
.btn-back.visible { display: block; }

/* ── FADE OVERLAY ── */
#fade {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background: #000; z-index: 100; opacity: 0;
  transition: opacity 0.8s ease; pointer-events: none;
}
#fade.black { opacity: 1; pointer-events: all; }

/* ── SCANLINES ── */
.scanlines {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, #00000012 2px, #00000012 4px);
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="letterbox-top" id="lt"></div>
<div class="letterbox-bot" id="lb"></div>

<!-- INTRO -->
<div class="screen" id="screen-intro">
  <div id="story-text"></div>
  <div id="logo-reveal">VOID RUNNER</div>
  <div id="logo-sub">NAVIGUJ PRÁZDNOTOU</div>
  <button id="btn-continue">VSTOUPIT DO PRÁZDNOTY</button>
</div>

<!-- NAME -->
<div class="screen" id="screen-name">
  <div class="screen-title">IDENTIFIKACE</div>
  <div class="screen-sub">JAK TĚ MAJÍ ZNÁT HVĚZDY?</div>
  <input id="name-input" type="text" maxlength="16" placeholder="TVOJE JMÉNO" autocomplete="off" spellcheck="false">
  <button id="btn-name-next">POTVRDIT</button>
</div>

<!-- SHIP — canvas-based selection, DOM screen kept for state tracking only -->
<div class="screen" id="screen-ship" style="pointer-events:none;opacity:0!important;"></div>
<canvas id="ship-canvas"></canvas>
<div id="ship-select-title">VÝBĚR LODI</div>
<div id="ship-select-sub">VYBER SVOU LOĎ</div>
<button id="btn-fly">LETĚT →</button>

<!-- MODE -->
<div class="screen" id="screen-mode">
  <div class="screen-title">HERNÍ MÓD</div>
  <div class="screen-sub">VYBER SI SVŮJ PŘÍBĚH</div>
  <div class="modes-row" id="modes-row"></div>
  <button id="btn-launch">SPUSTIT MISI</button>
</div>

<button class="btn-back" id="btn-back">← ZPĚT</button>
<div id="fade" class="black"></div>
<div class="scanlines"></div>

<script>
// ── SHIPS DATA ─────────────────────────────────────────────────────────────
const SHIPS = [
  {
    id: 'scout',
    name: 'PRŮZKUMNÍK',
    desc: 'Rychlá a obratná.\nIdeal pro vyhýbání.',
    color: '#00ffc8',
    stats: { speed: 0.9, armor: 0.3, firepower: 0.5 },
    shape: 'scout',
  },
  {
    id: 'fighter',
    name: 'BOJOVNÍK',
    desc: 'Vyvážená loď.\nPro zkušené piloty.',
    color: '#ff8c00',
    stats: { speed: 0.6, armor: 0.6, firepower: 0.8 },
    shape: 'fighter',
  },
  {
    id: 'tank',
    name: 'PEVNOST',
    desc: 'Pomalá, ale odolná.\nVydrží víc zásahů.',
    color: '#ff3355',
    stats: { speed: 0.35, armor: 0.95, firepower: 0.6 },
    shape: 'tank',
  },
];

const MODES = [
  {
    id: 'story',
    name: 'PŘÍBĚH',
    icon: '🌌',
    desc: '10 kol s rostoucí\nobtížností.\nFinální boss fight.',
    color: '#00ffc8',
  },
  {
    id: 'endless',
    name: 'ENDLESS',
    icon: '♾️',
    desc: 'Nekonečná prázdnota.\nPřežij co nejdéle.\nŽádná milost.',
    color: '#ff8c00',
  },
  {
    id: 'hardcore',
    name: 'HARDCORE',
    icon: '💀',
    desc: 'Jeden život.\nŽádné chyby.\nJen pro odvážné.',
    color: '#ff3355',
  },
];

// ── CANVAS BLACK HOLE ──────────────────────────────────────────────────────
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  initStars();
}
window.addEventListener('resize', resize);

// Stars
const stars = [];
function initStars() {
  stars.length = 0;
  for (let i = 0; i < 400; i++) {
    const angle  = Math.random() * Math.PI * 2;
    const radius = 80 + Math.random() * Math.max(W, H) * 0.7;
    stars.push({
      bx: cx + Math.cos(angle) * radius,
      by: cy + Math.sin(angle) * radius,
      size: Math.random() * 1.4 + 0.2,
      bright: 0.2 + Math.random() * 0.8,
      twinkle: Math.random() * Math.PI * 2,
    });
  }
}

// Accretion dust — more particles, wider disk
const dustCount = 600;
const dust = [];
for (let i = 0; i < dustCount; i++) {
  const r     = 160 + Math.random() * 380;
  const angle = Math.random() * Math.PI * 2;
  const speed = (0.0002 + Math.random() * 0.0005) * (Math.random() < 0.5 ? 1 : -1);
  const hue   = 15 + Math.random() * 50;
  dust.push({
    angle, r,
    baseR: r,
    speed,
    size: Math.random() * 3.5 + 0.5,
    bright: Math.random(),
    hue,
    warp: Math.random() * Math.PI * 2,
    warpSpeed: (Math.random() - 0.5) * 0.002,
    layer: i < 200 ? 'inner' : i < 420 ? 'mid' : 'outer',
  });
}

// Relativistic jets — vertical beams like Gargantua
const jetParticles = [];
for (let i = 0; i < 120; i++) {
  jetParticles.push({
    progress: Math.random(),
    speed: 0.003 + Math.random() * 0.005,
    side: Math.random() < 0.5 ? 1 : -1,
    offset: (Math.random() - 0.5) * 18,
    size: Math.random() * 2.5 + 0.5,
    bright: 0.3 + Math.random() * 0.7,
  });
}

let frame = 0;

// ── APPROACH ANIMATION ──
// Phase 0: BH appears small, distant (scale 0→0.18)
// Phase 1: Slowly drifts closer (0.18→0.55) — 4s
// Phase 2: Accelerates toward you (0.55→8.0) — 2.5s — fills screen
// Phase 3: Pure black flash, then story text appears
let bhScale    = 0.0;
let bhPhase    = 0;      // 0|1|2|3
let bhTime     = 0;      // ms elapsed in current phase
let engulfDone = false;

const PHASE_DUR = [1200, 4000, 2200]; // ms per phase

function tickApproach(dt) {
  if (engulfDone) return;
  bhTime += dt;

  if (bhPhase === 0) {
    // Appear from nothing
    const p = Math.min(1, bhTime / PHASE_DUR[0]);
    bhScale = p * 0.18;
    if (p >= 1) { bhPhase = 1; bhTime = 0; }

  } else if (bhPhase === 1) {
    // Slow drift closer
    const p = Math.min(1, bhTime / PHASE_DUR[1]);
    bhScale = 0.18 + p * 0.37;
    if (p >= 1) { bhPhase = 2; bhTime = 0; }

  } else if (bhPhase === 2) {
    // Accelerate — exponential zoom
    const p = Math.min(1, bhTime / PHASE_DUR[2]);
    const eased = p * p * p; // cubic ease-in
    bhScale = 0.55 + eased * 14;

    // Camera shake as we approach
    if (p > 0.5) {
      const shake = (p - 0.5) * 2;
      canvas.style.transform = `translate(${(Math.random()-0.5)*shake*12}px,${(Math.random()-0.5)*shake*8}px)`;
    }

    if (p >= 1) {
      bhPhase = 3;
      bhTime  = 0;
      engulfDone = true;
      canvas.style.transform = '';

      // Flash white then trigger story
      const fade = document.getElementById('fade');
      fade.style.background   = '#fff';
      fade.style.transition   = 'opacity 0.15s ease';
      fade.classList.add('black');
      setTimeout(() => {
        fade.style.background = '#000';
        fade.style.transition = 'opacity 1.2s ease';
        fade.classList.remove('black');
        // Start story — use showScreen so currentScreen is tracked
        showScreen('screen-intro');
        storyStarted = true;
        // Letterbox open after flash
        setTimeout(() => {
          document.getElementById('lt').classList.add('open');
          document.getElementById('lb').classList.add('open');
        }, 400);
      }, 200);
    }
  }
}

function drawBlackHole(t) {
  const s = bhScale;

  // ── Far outer nebula glow ──
  for (let ring = 5; ring >= 0; ring--) {
    const r     = (420 + ring * 90) * s;
    const alpha = 0.025 - ring * 0.003;
    const grad  = ctx.createRadialGradient(cx, cy, r * 0.4, cx, cy, r);
    grad.addColorStop(0, `rgba(255,120,0,${alpha})`);
    grad.addColorStop(0.6, `rgba(180,60,0,${alpha * 0.4})`);
    grad.addColorStop(1,  'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  }

  // ── Relativistic jets (vertical beams) ──
  jetParticles.forEach(jp => {
    jp.progress += jp.speed;
    if (jp.progress > 1) jp.progress = 0;
    const jetLen = 340 * s;
    const dist   = jp.progress * jetLen;
    const px     = cx + jp.offset * s;
    const py     = cy + jp.side * (130 * s + dist);
    const alpha  = jp.bright * (1 - jp.progress) * 0.5 * s;
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = `rgba(160,200,255,1)`;
    ctx.shadowColor = '#aaddff';
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.arc(px, py, jp.size * (1 - jp.progress * 0.7) * s, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  // ── Accretion disk dust ──
  dust.forEach(d => {
    d.angle += d.speed;
    d.warp  += d.warpSpeed;
    const warpR   = d.baseR * (1 + 0.07 * Math.sin(d.warp));
    const flatten = d.layer === 'inner' ? 0.22 : d.layer === 'mid' ? 0.28 : 0.35;
    const px      = cx + Math.cos(d.angle) * warpR * s;
    const py      = cy + Math.sin(d.angle) * warpR * s * flatten;
    const alpha   = d.bright * (0.4 + 0.5 * (1 - Math.abs(warpR - 220) / 340));
    const pulse   = 0.6 + 0.4 * Math.sin(t * 0.0007 + d.angle * 4);
    const bright  = d.layer === 'inner' ? 75 : d.layer === 'mid' ? 62 : 50;
    ctx.globalAlpha = Math.max(0, alpha * pulse * s);
    ctx.fillStyle   = `hsl(${d.hue}, 95%, ${bright}%)`;
    ctx.beginPath();
    ctx.arc(px, py, d.size * s, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // ── Photon sphere glow (bright orange ring) ──
  const phR   = 150 * s;
  const phGrad = ctx.createRadialGradient(cx, cy, phR * 0.7, cx, cy, phR * 1.2);
  phGrad.addColorStop(0,   `rgba(255,180,40,${0.5 * s})`);
  phGrad.addColorStop(0.4, `rgba(255,120,0,${0.35 * s})`);
  phGrad.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = phGrad;
  ctx.beginPath(); ctx.arc(cx, cy, phR * 1.2, 0, Math.PI * 2); ctx.fill();

  // ── Shadow disk behind BH (Interstellar style top shadow) ──
  ctx.save();
  ctx.globalAlpha = 0.7 * s;
  const shadowGrad = ctx.createLinearGradient(cx, cy - 130*s, cx, cy + 30*s);
  shadowGrad.addColorStop(0, 'rgba(0,0,0,0)');
  shadowGrad.addColorStop(0.5, 'rgba(0,0,8,0.7)');
  shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = shadowGrad;
  ctx.beginPath(); ctx.ellipse(cx, cy, 200*s, 120*s, 0, Math.PI, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Event horizon ──
  const bhR   = 116 * s;
  const bhGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, bhR);
  bhGrad.addColorStop(0,   '#000000');
  bhGrad.addColorStop(0.75, '#000003');
  bhGrad.addColorStop(1,   '#00000a');
  ctx.fillStyle = bhGrad;
  ctx.beginPath(); ctx.arc(cx, cy, bhR, 0, Math.PI * 2); ctx.fill();

  // ── Bright photon ring line ──
  ctx.strokeStyle = `rgba(255,220,120,${0.75 * s})`;
  ctx.lineWidth   = 2.5 * s;
  ctx.shadowColor = '#ffaa00';
  ctx.shadowBlur  = 28;
  ctx.beginPath(); ctx.arc(cx, cy, 124 * s, 0, Math.PI * 2); ctx.stroke();

  // ── Second faint ring ──
  ctx.strokeStyle = `rgba(255,160,60,${0.25 * s})`;
  ctx.lineWidth   = 6 * s;
  ctx.shadowBlur  = 40;
  ctx.beginPath(); ctx.arc(cx, cy, 138 * s, 0, Math.PI * 2); ctx.stroke();
  ctx.shadowBlur  = 0;

  // ── Lens flare dot ──
  const flareX = cx + 160 * s, flareY = cy - 80 * s;
  const flareAlpha = 0.3 * s * (0.7 + 0.3 * Math.sin(t * 0.001));
  ctx.globalAlpha = flareAlpha;
  ctx.fillStyle   = '#fff8e0';
  ctx.shadowColor = '#ffcc66';
  ctx.shadowBlur  = 20;
  ctx.beginPath(); ctx.arc(flareX, flareY, 3 * s, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function drawStars(t) {
  const lensStrength = bhScale * 18000;
  stars.forEach(s => {
    const dx   = s.bx - cx, dy = s.by - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    // Stronger lensing as BH gets closer
    const pull = Math.min(0.7, lensStrength / (dist * dist));
    const px   = s.bx - dx * pull;
    const py   = s.by - dy * pull;
    // Stars streak toward center during phase 2
    if (bhPhase === 2 && bhTime > 800) {
      const streak = Math.min(12, bhScale * 0.8);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth   = s.size * 0.5;
      ctx.globalAlpha = s.bright * 0.4;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px + (cx - px) * 0.06 * streak, py + (cy - py) * 0.06 * streak);
      ctx.stroke();
    }
    const twink = 0.5 + 0.5 * Math.sin(t * 0.001 + s.twinkle);
    ctx.globalAlpha = s.bright * twink * Math.min(1, dist / 180) * Math.min(1, bhScale * 4);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(px, py, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function renderBg(t) {
  ctx.clearRect(0, 0, W, H);
  // Deep space gradient
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, W * 0.8);
  bg.addColorStop(0,   '#08050f');
  bg.addColorStop(0.5, '#050308');
  bg.addColorStop(1,   '#000005');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawStars(t);
  drawBlackHole(t);
}

// ── STORY TEXT ─────────────────────────────────────────────────────────────
const storyLines = [
  "Za hranicí poznatelného vesmíru...",
  "...tam kde čas ztrácí smysl a světlo umírá...",
  "...se otevírá Prázdnota.",
  "",
  "Nikdo se nevrátil. Ty jdeš jako první.",
];

let storyDone    = false;
let storyStarted = false;
let storyIndex   = 0;
let charIndex    = 0;
let storyTimer   = 0;
const CHAR_DELAY  = 42;
const LINE_PAUSE  = 800;

function tickStory(dt) {
  if (!storyStarted || storyDone) return;
  storyTimer += dt;
  if (storyTimer < CHAR_DELAY) return;
  storyTimer = 0;

  const line = storyLines[storyIndex];
  if (charIndex < line.length) {
    _sfxType(line[charIndex]);
    charIndex++;
  } else {
    // Pause at end of line
    storyTimer = -LINE_PAUSE;
    storyIndex++;
    charIndex = 0;
    if (storyIndex >= storyLines.length) {
      storyDone = true;
      // Show logo + button
      setTimeout(() => {
        document.getElementById('logo-reveal').classList.add('show');
        document.getElementById('logo-sub').classList.add('show');
      }, 400);
      setTimeout(() => {
        document.getElementById('btn-continue').classList.add('show');
      }, 1800);
      return;
    }
  }
  // Rebuild displayed text
  const el = document.getElementById('story-text');
  let html = '';
  for (let i = 0; i < storyIndex; i++) {
    html += storyLines[i] + '<br>';
  }
  html += storyLines[storyIndex]?.substring(0, charIndex) || '';
  el.innerHTML = html;
}

// ── MAIN LOOP ──────────────────────────────────────────────────────────────
let last = 0;
function loop(now) {
  const dt = now - last; last = now; frame++;
  tickApproach(dt);
  renderBg(now);
  tickStory(dt);
  tickShipSelect(dt);
  drawShipSelect();
  requestAnimationFrame(loop);
}
resize();
requestAnimationFrame(loop);

// ── SCI-FI TERMINAL AUDIO ──────────────────────────────────────────────────
let _ac = null;
let _acReady = false;
let _typeCount = 0;

function _initAC() {
  if (_ac) return;
  try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function _unlockAC() {
  _initAC();
  if (_ac && _ac.state === 'suspended') _ac.resume();
  _acReady = true;
}
// Odemkni AudioContext při první interakci
document.addEventListener('pointerdown', _unlockAC, { once: true });
document.addEventListener('keydown',     _unlockAC, { once: true });

function _sfxType(ch) {
  if (!_ac || !_acReady) return;
  try {
    const t   = _ac.currentTime;
    const dur = 0.038;
    _typeCount++;

    // ── Noise click (mechanický zvuk klávesy) ──
    const bufLen = Math.floor(_ac.sampleRate * dur);
    const buf    = _ac.createBuffer(1, bufLen, _ac.sampleRate);
    const data   = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 1.8);
    }
    const src  = _ac.createBufferSource();
    const filt = _ac.createBiquadFilter();
    const gn   = _ac.createGain();
    filt.type            = 'bandpass';
    filt.frequency.value = 900 + (_typeCount % 7) * 120; // variace frekvence
    filt.Q.value         = 3;
    gn.gain.setValueAtTime(0.09, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.buffer = buf;
    src.connect(filt); filt.connect(gn); gn.connect(_ac.destination);
    src.start(t);

    // ── Krátký elektronický tón (typický retro terminal beep) ──
    if (ch && ch !== ' ' && ch !== '') {
      const osc = _ac.createOscillator();
      const og  = _ac.createGain();
      osc.type            = 'square';
      osc.frequency.value = 680 + (_typeCount % 5) * 80;
      og.gain.setValueAtTime(0.028, t);
      og.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
      osc.connect(og); og.connect(_ac.destination);
      osc.start(t); osc.stop(t + 0.032);
    }
  } catch(e) {}
}

// ── SHIP SELECTION — live canvas scene ─────────────────────────────────────
const shipCanvas  = document.getElementById('ship-canvas');
const shipCtx     = shipCanvas.getContext('2d');
let   ssW = 0, ssH = 0;

function ssResize() {
  ssW = shipCanvas.width  = window.innerWidth;
  ssH = shipCanvas.height = window.innerHeight;
}
window.addEventListener('resize', ssResize);
ssResize();

// Per-ship runtime state (indices match SHIPS array)
let ssShips   = [];
let ssActive  = false;
let ssChosen  = -1;       // index of chosen ship
let ssHovered = -1;
let ssFrame   = 0;
let ssOnDone  = null;

// Triangle positions: 0=top-center, 1=bottom-left, 2=bottom-right
function _ssTargetPos(i) {
  const narrow = ssW < 600;
  if (narrow) {
    // Triangle layout for portrait
    const tops  = [{ x: ssW*0.5, y: ssH*0.30 }, { x: ssW*0.22, y: ssH*0.60 }, { x: ssW*0.78, y: ssH*0.60 }];
    return tops[i] || tops[0];
  } else {
    // Horizontal row for landscape
    const gap = ssW / 4;
    return { x: gap * (i + 1), y: ssH * 0.48 };
  }
}

function _ssStartPos(i) {
  // Fly-in origins
  const dirs = [
    { x: ssW * 0.5, y: -250 },         // from top
    { x: -250,      y: ssH * 0.8 },    // from bottom-left
    { x: ssW + 250, y: ssH * 0.8 },    // from bottom-right
  ];
  return dirs[i] || dirs[0];
}

function startShipSelect(onDoneCallback) {
  ssOnDone  = onDoneCallback;
  ssActive  = true;
  ssChosen  = -1;
  ssHovered = -1;
  ssFrame   = 0;

  ssShips = SHIPS.map((def, i) => {
    const start  = _ssStartPos(i);
    const target = _ssTargetPos(i);
    return {
      def,
      x: start.x, y: start.y,
      tx: target.x, ty: target.y,
      vx: 0, vy: 0,
      alpha: 0,
      bobPhase: Math.random() * Math.PI * 2,
      state: 'flying_in',   // flying_in | settled | chosen | flying_away
      exhaustFlicker: 0,
    };
  });

  shipCanvas.classList.add('active');
  document.getElementById('ship-select-title').classList.add('show');
  document.getElementById('ship-select-sub').classList.add('show');

  shipCanvas.addEventListener('mousemove', _ssOnMove);
  shipCanvas.addEventListener('click',     _ssOnClick);
  shipCanvas.addEventListener('touchstart', _ssOnTouch, { passive: true });
}

function stopShipSelect() {
  ssActive = false;
  shipCanvas.classList.remove('active');
  document.getElementById('ship-select-title').classList.remove('show');
  document.getElementById('ship-select-sub').classList.remove('show');
  shipCanvas.removeEventListener('mousemove', _ssOnMove);
  shipCanvas.removeEventListener('click',     _ssOnClick);
  shipCanvas.removeEventListener('touchstart', _ssOnTouch);
  shipCtx.clearRect(0, 0, ssW, ssH);
}

function _ssHitRadius(i) {
  const ship = SHIPS[i];
  const cfg  = _shipCfg(ship.shape);
  return 52 * Math.max(cfg.sw, cfg.sh);
}

function _ssOnMove(e) {
  if (!ssActive || ssChosen >= 0) return;
  const mx = e.clientX, my = e.clientY;
  ssHovered = -1;
  ssShips.forEach((s, i) => {
    if (s.state !== 'settled') return;
    const d = Math.hypot(mx - s.x, my - s.y);
    if (d < _ssHitRadius(i)) ssHovered = i;
  });
}

function _ssOnTouch(e) {
  if (!ssActive || ssChosen >= 0) return;
  const t = e.touches[0];
  const mx = t.clientX, my = t.clientY;
  ssHovered = -1;
  ssShips.forEach((s, i) => {
    if (s.state !== 'settled') return;
    const d = Math.hypot(mx - s.x, my - s.y);
    if (d < _ssHitRadius(i) * 1.3) ssHovered = i;
  });
  // Treat tap as click
  if (ssHovered >= 0) _ssPickShip(ssHovered);
}

function _ssOnClick(e) {
  if (!ssActive || ssChosen >= 0) return;
  const mx = e.clientX, my = e.clientY;
  ssShips.forEach((s, i) => {
    if (s.state !== 'settled') return;
    const d = Math.hypot(mx - s.x, my - s.y);
    if (d < _ssHitRadius(i)) _ssPickShip(i);
  });
}

function _ssPickShip(i) {
  if (ssChosen >= 0) return;
  ssChosen  = i;
  selectedShip = SHIPS[i].id;

  ssShips.forEach((s, idx) => {
    if (idx === i) {
      s.state = 'chosen';
    } else {
      s.state = 'flying_away';
      // Fly away opposite to where they came from
      const sp = _ssStartPos(idx);
      const dx = sp.x - s.x, dy = sp.y - s.y;
      const len = Math.hypot(dx, dy) || 1;
      s.vx = (dx / len) * 8;
      s.vy = (dy / len) * 8;
    }
  });

  // Show LETĚT button after a short delay
  setTimeout(() => {
    document.getElementById('btn-fly').classList.add('ready');
  }, 600);
}

function tickShipSelect(dt) {
  if (!ssActive) return;
  ssFrame++;

  ssShips.forEach((s, i) => {
    s.bobPhase += 0.025;
    s.exhaustFlicker = Math.random();

    if (s.state === 'flying_in') {
      s.alpha = Math.min(1, s.alpha + 0.018);
      const dx = s.tx - s.x, dy = s.ty - s.y;
      s.vx = s.vx * 0.88 + dx * 0.045;
      s.vy = s.vy * 0.88 + dy * 0.045;
      s.x += s.vx; s.y += s.vy;
      if (Math.hypot(dx, dy) < 3 && Math.hypot(s.vx, s.vy) < 0.8) {
        s.x = s.tx; s.y = s.ty; s.vx = 0; s.vy = 0;
        s.state = 'settled';
      }
    } else if (s.state === 'settled') {
      const bob = Math.sin(s.bobPhase) * 5;
      const hovOff = ssHovered === i ? -8 : 0;
      s.displayY = s.ty + bob + hovOff;
      s.displayX = s.x;
    } else if (s.state === 'chosen') {
      // Drift gently toward center
      const cx = ssW * 0.5, cy = ssH * 0.45;
      s.x += (cx - s.x) * 0.02;
      s.y += (cy - s.y) * 0.02;
      const bob = Math.sin(s.bobPhase) * 3;
      s.displayX = s.x;
      s.displayY = s.y + bob;
    } else if (s.state === 'flying_away') {
      s.vx *= 1.06; s.vy *= 1.06;
      s.x += s.vx; s.y += s.vy;
      s.alpha = Math.max(0, s.alpha - 0.025);
    }
  });
}

function drawShipSelect() {
  if (!ssActive) return;
  shipCtx.clearRect(0, 0, ssW, ssH);

  // Draw each ship
  ssShips.forEach((s, i) => {
    if (s.alpha <= 0) return;
    const dx = s.displayX !== undefined ? s.displayX : s.x;
    const dy = s.displayY !== undefined ? s.displayY : s.y;
    shipCtx.globalAlpha = s.alpha * (s.state === 'flying_away' ? s.alpha : 1);
    const isHov = ssHovered === i;
    const isChosen = ssChosen === i;
    const ship = SHIPS[i];

    _ssDrawShip(shipCtx, ship, dx, dy, isHov || isChosen, s.exhaustFlicker, ssFrame);

    // Stats panel on hover or chosen
    if ((isHov && ssChosen < 0) || isChosen) {
      _ssDrawStats(shipCtx, ship, dx, dy, ssW, ssH);
    }
    shipCtx.globalAlpha = 1;
  });

  // Hint text (while no ship is chosen and all settled)
  if (ssChosen < 0 && ssShips.every(s => s.state === 'settled')) {
    shipCtx.globalAlpha = 0.35 + 0.25 * Math.sin(ssFrame * 0.05);
    shipCtx.font = '12px Orbitron, monospace';
    shipCtx.fillStyle = '#fff';
    shipCtx.textAlign = 'center';
    shipCtx.fillText('KLIKNI NA LOĎ', ssW / 2, ssH * 0.88);
    shipCtx.globalAlpha = 1;
  }
}

function _shipCfg(shape) {
  return { scout: { sw: 1.0, sh: 1.15, noseH: 1.15 }, fighter: { sw: 1.0, sh: 1.0, noseH: 1.0 }, tank: { sw: 1.25, sh: 0.85, noseH: 0.75 } }[shape] || { sw: 1.0, sh: 1.0, noseH: 1.0 };
}

function _ssDrawShip(ctx, ship, ox, oy, highlighted, exhaustFlicker, frame) {
  const cfg = _shipCfg(ship.shape);
  const sc  = ship.color;
  const pw  = 42 * cfg.sw;
  const ph  = 56 * cfg.sh;

  ctx.save();
  ctx.translate(ox, oy);

  // Outer halo
  const halo = ctx.createRadialGradient(0, 0, pw * 0.3, 0, 0, pw * (highlighted ? 3.0 : 2.0));
  halo.addColorStop(0, sc + (highlighted ? '44' : '22'));
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(0, 0, pw * 3.0, 0, Math.PI * 2); ctx.fill();

  ctx.shadowColor = sc;
  ctx.shadowBlur  = highlighted ? 28 : 18;

  // Outer wing panels
  ctx.fillStyle   = '#0a1a2a';
  ctx.strokeStyle = sc + (highlighted ? 'cc' : '77');
  ctx.lineWidth   = highlighted ? 1.5 : 1;
  ctx.beginPath();
  ctx.moveTo(-pw*0.55, ph*0.08); ctx.lineTo(-pw*1.35, ph*0.42);
  ctx.lineTo(-pw*1.1,  ph*0.62); ctx.lineTo(-pw*0.55, ph*0.5);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo( pw*0.55, ph*0.08); ctx.lineTo( pw*1.35, ph*0.42);
  ctx.lineTo( pw*1.1,  ph*0.62); ctx.lineTo( pw*0.55, ph*0.5);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Main hull
  ctx.fillStyle   = '#0d2035';
  ctx.strokeStyle = sc;
  ctx.lineWidth   = highlighted ? 2 : 1.5;
  ctx.shadowBlur  = highlighted ? 28 : 18;
  ctx.beginPath();
  ctx.moveTo(0,           -ph*cfg.noseH);
  ctx.lineTo(-pw*0.28,   -ph*0.4);
  ctx.lineTo(-pw*0.55,    ph*0.08);
  ctx.lineTo(-pw*0.72,    ph*0.48);
  ctx.lineTo(-pw*0.42,    ph*0.58);
  ctx.lineTo(-pw*0.18,    ph*0.48);
  ctx.lineTo(0,            ph*0.58);
  ctx.lineTo( pw*0.18,    ph*0.48);
  ctx.lineTo( pw*0.42,    ph*0.58);
  ctx.lineTo( pw*0.72,    ph*0.48);
  ctx.lineTo( pw*0.55,    ph*0.08);
  ctx.lineTo( pw*0.28,   -ph*0.4);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Fuselage stripe
  ctx.fillStyle = sc + '33'; ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(0,          -ph*0.75); ctx.lineTo(-pw*0.22, ph*0.05);
  ctx.lineTo(-pw*0.12,   ph*0.35);  ctx.lineTo(0,        ph*0.45);
  ctx.lineTo( pw*0.12,   ph*0.35);  ctx.lineTo( pw*0.22, ph*0.05);
  ctx.closePath(); ctx.fill();

  // Engine pods
  ctx.fillStyle = '#081828'; ctx.strokeStyle = sc + 'aa'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(-pw*0.6, ph*0.3, pw*0.18, ph*0.22,  0.2, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse( pw*0.6, ph*0.3, pw*0.18, ph*0.22, -0.2, 0, Math.PI*2); ctx.fill(); ctx.stroke();

  // Cockpit
  ctx.fillStyle = '#020810'; ctx.strokeStyle = sc + 'cc'; ctx.lineWidth = 1;
  ctx.shadowColor = sc; ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(0,          -ph*0.72*cfg.noseH);
  ctx.lineTo(-pw*0.2,   -ph*0.18);
  ctx.lineTo(0,           ph*0.05);
  ctx.lineTo( pw*0.2,   -ph*0.18);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle = sc + 'cc'; ctx.shadowBlur = 14;
  ctx.beginPath(); ctx.arc(0, -ph*0.3, 3.5, 0, Math.PI*2); ctx.fill();

  // Accent lines
  ctx.shadowBlur = 0; ctx.strokeStyle = sc + '44'; ctx.lineWidth = 1;
  [-1, 1].forEach(side => {
    ctx.beginPath(); ctx.moveTo(side*pw*0.3, -ph*0.15); ctx.lineTo(side*pw*0.65, ph*0.35); ctx.stroke();
  });

  // Wing-tip lights
  const bl = Math.floor(frame / 18) % 2;
  ctx.shadowBlur = 12;
  ctx.fillStyle = bl ? '#ff4455' : '#ff334422';
  ctx.beginPath(); ctx.arc(-pw*1.3, ph*0.44, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = bl ? '#44ff88' : '#33ff5522';
  ctx.beginPath(); ctx.arc( pw*1.3, ph*0.44, 3, 0, Math.PI*2); ctx.fill();

  // Engine exhaust (animated flame)
  ctx.shadowBlur = 0;
  const fl  = (12 + exhaustFlicker * 20) * (highlighted ? 1.4 : 1);
  const flC = highlighted ? sc : sc + 'aa';
  const exGrad = ctx.createLinearGradient(0, ph*0.58, 0, ph*0.58 + fl);
  exGrad.addColorStop(0, flC);
  exGrad.addColorStop(1, 'rgba(0,60,200,0)');
  ctx.fillStyle = exGrad;
  ctx.beginPath(); ctx.moveTo(-6, ph*0.58); ctx.lineTo(0, ph*0.58+fl); ctx.lineTo(6, ph*0.58);
  ctx.closePath(); ctx.fill();
  // Side engine exhausts
  const fl2 = (6 + exhaustFlicker * 10) * (highlighted ? 1.3 : 1);
  [-pw*0.42, pw*0.42].forEach(ex => {
    const eg2 = ctx.createLinearGradient(ex, ph*0.58, ex, ph*0.58 + fl2);
    eg2.addColorStop(0, sc + '99'); eg2.addColorStop(1, 'rgba(0,60,200,0)');
    ctx.fillStyle = eg2;
    ctx.beginPath(); ctx.moveTo(ex-3.5, ph*0.58); ctx.lineTo(ex, ph*0.58+fl2); ctx.lineTo(ex+3.5, ph*0.58);
    ctx.closePath(); ctx.fill();
  });

  ctx.restore();
}

function _ssDrawStats(ctx, ship, sx, sy, W, H) {
  const panelW = Math.min(200, W * 0.42);
  const panelH = 140;
  const margin = 16;

  // Position panel: prefer right side, flip left if near edge
  let px = sx + 80;
  if (px + panelW + margin > W) px = sx - 80 - panelW;
  let py = sy - panelH / 2;
  py = Math.max(margin, Math.min(H - panelH - margin, py));

  // Panel background
  ctx.globalAlpha = 0.92;
  ctx.fillStyle = '#060c18';
  _ssRoundRect(ctx, px, py, panelW, panelH, 8); ctx.fill();
  ctx.strokeStyle = ship.color + '88';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = ship.color; ctx.shadowBlur = 10;
  _ssRoundRect(ctx, px, py, panelW, panelH, 8); ctx.stroke();
  ctx.shadowBlur = 0;

  // Name
  ctx.font = `bold 13px Orbitron, monospace`;
  ctx.fillStyle = ship.color; ctx.textAlign = 'left';
  ctx.shadowColor = ship.color; ctx.shadowBlur = 8;
  ctx.fillText(ship.name, px + 12, py + 22);
  ctx.shadowBlur = 0;

  // Desc
  ctx.font = '11px Rajdhani, sans-serif';
  ctx.fillStyle = '#ffffff77';
  const descLines = ship.desc.split('\n');
  descLines.forEach((line, i) => ctx.fillText(line, px + 12, py + 38 + i * 15));

  // Stat bars
  const barY = py + 38 + descLines.length * 15 + 8;
  ['speed', 'armor', 'firepower'].forEach((key, i) => {
    const val = ship.stats[key];
    const bx = px + 12, by = barY + i * 26;
    const bw = panelW - 24;
    ctx.font = '9px Orbitron, monospace';
    ctx.fillStyle = '#ffffff44'; ctx.textAlign = 'left';
    ctx.fillText(key.toUpperCase(), bx, by + 8);
    ctx.fillStyle = '#ffffff22';
    ctx.fillRect(bx, by + 12, bw, 4);
    ctx.fillStyle = ship.color;
    ctx.shadowColor = ship.color; ctx.shadowBlur = 6;
    ctx.fillRect(bx, by + 12, bw * val, 4);
    ctx.shadowBlur = 0;
    ctx.font = '9px Orbitron, monospace'; ctx.textAlign = 'right'; ctx.fillStyle = '#ffffff66';
    ctx.fillText(`${Math.round(val*100)}%`, px + panelW - 8, by + 8);
  });

  ctx.globalAlpha = 1;
}

function _ssRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ── OLD buildShips kept as stub (no longer used) ──
function buildShips() {
  const row = document.getElementById('ships-row');
  row.innerHTML = '';
  SHIPS.forEach(ship => {
    const card = document.createElement('div');
    card.className = 'ship-card';
    card.style.setProperty('--ship-color', ship.color);

    const cv = document.createElement('canvas');
    cv.className = 'ship-canvas';
    cv.width = 80; cv.height = 90;
    drawShipPreview(cv.getContext('2d'), ship, 80, 90);

    const statBars = ['speed','armor','firepower'].map(key => {
      const val = ship.stats[key];
      return `<div class="stat-bar-wrap">
        <div class="stat-bar-label"><span>${key.toUpperCase()}</span><span>${Math.round(val*100)}%</span></div>
        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${val*100}%;--ship-color:${ship.color}"></div></div>
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="ship-name">${ship.name}</div>
      <div class="ship-desc">${ship.desc.replace(/\n/g,'<br>')}</div>
      ${statBars}
    `;
    card.insertBefore(cv, card.firstChild);

    card.addEventListener('click', () => {
      document.querySelectorAll('.ship-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedShip = ship.id;
      document.getElementById('btn-ship-next').classList.add('ready');
    });
    row.appendChild(card);
  });
}

function drawShipPreview(ctx, ship, W, H) {
  ctx.clearRect(0, 0, W, H);

  // Scale factors per ship type — scout is slim/tall, tank is wide/squat
  const cfg = {
    scout:   { sw: 1.0, sh: 1.15, noseH: 1.15 },
    fighter: { sw: 1.0, sh: 1.0,  noseH: 1.0  },
    tank:    { sw: 1.25, sh: 0.85, noseH: 0.75 },
  }[ship.shape] || { sw: 1.0, sh: 1.0, noseH: 1.0 };

  const sc = ship.color;
  // Base size units (matching player.js proportions, scaled to preview canvas)
  const pw = 18 * cfg.sw;  // half-width unit
  const ph = 24 * cfg.sh;  // half-height unit
  const ox = W / 2;
  const oy = H / 2 + 4;

  ctx.save();
  ctx.translate(ox, oy);

  // ── Outer halo ──
  const halo = ctx.createRadialGradient(0, 0, pw * 0.3, 0, 0, pw * 2.2);
  halo.addColorStop(0, sc + '22');
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(0, 0, pw * 2.2, 0, Math.PI * 2); ctx.fill();

  ctx.shadowColor = sc;
  ctx.shadowBlur  = 14;

  // ── Outer wing panels ──
  ctx.fillStyle   = '#0a1a2a';
  ctx.strokeStyle = sc + '88';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(-pw * 0.55,  ph * 0.08);
  ctx.lineTo(-pw * 1.35,  ph * 0.42);
  ctx.lineTo(-pw * 1.1,   ph * 0.62);
  ctx.lineTo(-pw * 0.55,  ph * 0.5);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo( pw * 0.55,  ph * 0.08);
  ctx.lineTo( pw * 1.35,  ph * 0.42);
  ctx.lineTo( pw * 1.1,   ph * 0.62);
  ctx.lineTo( pw * 0.55,  ph * 0.5);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // ── Main hull ──
  ctx.fillStyle   = '#0d2035';
  ctx.strokeStyle = sc;
  ctx.lineWidth   = 1.5;
  ctx.shadowBlur  = 14;
  ctx.beginPath();
  ctx.moveTo(0,             -ph * cfg.noseH);
  ctx.lineTo(-pw * 0.28,   -ph * 0.4);
  ctx.lineTo(-pw * 0.55,    ph * 0.08);
  ctx.lineTo(-pw * 0.72,    ph * 0.48);
  ctx.lineTo(-pw * 0.42,    ph * 0.58);
  ctx.lineTo(-pw * 0.18,    ph * 0.48);
  ctx.lineTo(0,              ph * 0.58);
  ctx.lineTo( pw * 0.18,    ph * 0.48);
  ctx.lineTo( pw * 0.42,    ph * 0.58);
  ctx.lineTo( pw * 0.72,    ph * 0.48);
  ctx.lineTo( pw * 0.55,    ph * 0.08);
  ctx.lineTo( pw * 0.28,   -ph * 0.4);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // ── Center fuselage stripe ──
  ctx.fillStyle = sc + '33';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(0,            -ph * 0.75);
  ctx.lineTo(-pw * 0.22,   ph * 0.05);
  ctx.lineTo(-pw * 0.12,   ph * 0.35);
  ctx.lineTo(0,             ph * 0.45);
  ctx.lineTo( pw * 0.12,   ph * 0.35);
  ctx.lineTo( pw * 0.22,   ph * 0.05);
  ctx.closePath(); ctx.fill();

  // ── Engine pods ──
  ctx.fillStyle   = '#081828';
  ctx.strokeStyle = sc + 'aa';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.ellipse(-pw * 0.6, ph * 0.3, pw * 0.18, ph * 0.22, 0.2, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse( pw * 0.6, ph * 0.3, pw * 0.18, ph * 0.22, -0.2, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  // ── Cockpit ──
  ctx.fillStyle   = '#020810';
  ctx.strokeStyle = sc + 'cc';
  ctx.lineWidth   = 1;
  ctx.shadowColor = sc;
  ctx.shadowBlur  = 8;
  ctx.beginPath();
  ctx.moveTo(0,           -ph * 0.72 * cfg.noseH);
  ctx.lineTo(-pw * 0.2,  -ph * 0.18);
  ctx.lineTo(0,            ph * 0.05);
  ctx.lineTo( pw * 0.2,  -ph * 0.18);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Cockpit glow dot
  ctx.fillStyle = sc + 'cc';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(0, -ph * 0.3, 2.5, 0, Math.PI * 2); ctx.fill();

  // ── Engine exhaust ──
  ctx.shadowBlur = 0;
  const grad = ctx.createLinearGradient(0, ph * 0.55, 0, ph * 0.55 + 14);
  grad.addColorStop(0, sc + 'cc');
  grad.addColorStop(1, 'rgba(0,60,200,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(-5, ph * 0.55);
  ctx.lineTo(0,  ph * 0.55 + 14);
  ctx.lineTo(5,  ph * 0.55);
  ctx.closePath(); ctx.fill();

  ctx.restore();
}

document.getElementById('btn-fly').addEventListener('click', () => {
  if (!selectedShip) return;
  document.getElementById('btn-fly').classList.remove('ready');
  fadeTo(() => {
    stopShipSelect();
    buildModes();
    showScreen('screen-mode');
  });
});

// ── MODES ──────────────────────────────────────────────────────────────────
function buildModes() {
  const row = document.getElementById('modes-row');
  row.innerHTML = '';
  MODES.forEach(mode => {
    const card = document.createElement('div');
    card.className = 'mode-card';
    card.style.setProperty('--mode-color', mode.color);
    card.innerHTML = `
      <div class="mode-icon">${mode.icon}</div>
      <div class="mode-name">${mode.name}</div>
      <div class="mode-desc">${mode.desc.replace(/\n/g,'<br>')}</div>
    `;
    card.addEventListener('click', () => {
      document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedMode = mode.id;
      document.getElementById('btn-launch').classList.add('ready');
    });
    row.appendChild(card);
  });
}

document.getElementById('btn-launch').addEventListener('click', () => {
  if (!selectedMode) return;
  // Save to localStorage
  localStorage.setItem('vr_player', JSON.stringify({
    name: playerName,
    ship: selectedShip,
    mode: selectedMode,
  }));
  // Launch game
  const f = document.getElementById('fade');
  f.style.transition = 'opacity 1s ease';
  f.classList.add('black');
  localStorage.setItem('vr_autostart', '1');
  setTimeout(() => { window.location.href = 'index.html'; }, 1100);
});

// ── BACK ───────────────────────────────────────────────────────────────────
document.getElementById('btn-back').addEventListener('click', () => {
  const prev = { 'screen-name': 'screen-intro', 'screen-ship': 'screen-name', 'screen-mode': 'screen-ship' };
  const p = prev[currentScreen];
  if (!p) return;
  if (currentScreen === 'screen-ship') {
    stopShipSelect();
    document.getElementById('btn-fly').classList.remove('ready');
    selectedShip = null;
    fadeTo(() => showScreen(p));
  } else if (currentScreen === 'screen-mode') {
    fadeTo(() => { buildModes(); showScreen(p); startShipSelect(); });
  } else {
    fadeTo(() => showScreen(p));
  }
});
</script>
