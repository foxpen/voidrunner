workflows:

  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      node: 22
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync android
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor add & sync iOS
        script: |
          npx cap add ios
          npx cap sync ios
          echo "--- www contents ---"
          ls -la www/
          echo "--- iOS public contents ---"
          ls -la ios/App/App/public/
      - name: Build iOS (simulator)
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/build/Build/Products/Debug-iphonesimulator/App.app
