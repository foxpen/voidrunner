<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VOID RUNNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Orbitron', monospace; }
canvas { display: block; position: fixed; top: 0; left: 0; }

#overlay {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
}

/* ── TITLE ── */
#title-wrap {
  text-align: center; margin-bottom: 64px;
  opacity: 0; transform: translateY(-16px);
  transition: opacity 0.9s ease, transform 0.9s ease;
}
#title-wrap.show { opacity: 1; transform: translateY(0); }

#title {
  font-size: clamp(36px, 6vw, 80px);
  font-weight: 900; color: #f5f0e8;
  letter-spacing: 0.12em; line-height: 1;
  text-shadow: 0 0 30px rgba(255,130,40,0.4), 0 0 80px rgba(255,80,10,0.18);
}
#divider {
  height: 1px; margin: 16px auto; width: 0;
  background: linear-gradient(90deg, transparent, rgba(255,160,60,0.65), transparent);
  transition: width 0.8s ease 0.3s;
}
#divider.show { width: min(500px, 70vw); }
#subtitle {
  font-size: clamp(9px, 1.2vw, 13px); font-weight: 400;
  color: rgba(255,175,70,0.65); letter-spacing: 0.5em;
  text-transform: uppercase;
  text-shadow: 0 0 20px rgba(255,120,20,0.3);
}

/* ── MENU BUTTONS ── */
#menu-wrap {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  pointer-events: all;
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.7s ease 0.5s, transform 0.7s ease 0.5s;
}
#menu-wrap.show { opacity: 1; transform: translateY(0); }

.menu-btn {
  width: min(320px, 80vw); padding: 16px 32px;
  font-family: 'Orbitron', monospace;
  font-size: clamp(11px, 1.4vw, 14px);
  font-weight: 700; letter-spacing: 0.28em;
  text-transform: uppercase; cursor: pointer;
  border: 1px solid rgba(255,160,60,0.4);
  background: rgba(255,120,30,0.07);
  color: rgba(255,200,100,0.9);
  transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
  position: relative; overflow: hidden;
}
.menu-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,140,40,0.08), transparent);
  transform: translateX(-100%);
  transition: transform 0.4s ease;
}
.menu-btn:hover::before { transform: translateX(100%); }
.menu-btn:hover {
  background: rgba(255,120,30,0.16);
  border-color: rgba(255,160,60,0.8);
  color: #fff;
  transform: translateY(-2px);
}
.menu-btn:active { transform: translateY(1px); }

.menu-btn.primary {
  border-color: rgba(255,160,60,0.7);
  background: rgba(255,120,30,0.13);
}
.menu-btn.disabled {
  opacity: 0.28; cursor: default; pointer-events: none;
}

.btn-hint {
  font-size: clamp(8px, 0.9vw, 10px);
  letter-spacing: 0.18em; color: rgba(255,160,60,0.4);
  margin-top: 2px; display: block;
}

/* ── VERSION ── */
#version {
  position: fixed; bottom: 24px; left: 32px;
  font-size: 9px; letter-spacing: 3px;
  color: rgba(255,255,255,0.15);
  z-index: 20;
}

/* ── FADE ── */
#fade {
  position: fixed; inset: 0;
  background: #000; z-index: 50;
  opacity: 1; pointer-events: none;
  transition: opacity 0.9s ease;
}
#fade.clear { opacity: 0; }
#fade.black { opacity: 1; pointer-events: all; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="overlay">
  <div id="title-wrap">
    <div id="title">VOID RUNNER</div>
    <div id="divider"></div>
    <div id="subtitle">HLAVNÍ MENU</div>
  </div>

  <div id="menu-wrap">
    <button class="menu-btn primary" id="btn-new">
      NOVÁ HRA
      <span class="btn-hint">vytvořit pilota &amp; loď</span>
    </button>
    <button class="menu-btn" id="btn-continue">
      POKRAČOVAT
      <span class="btn-hint" id="continue-hint">načíst posledního pilota</span>
    </button>
    <button class="menu-btn" id="btn-intro">
      INTRO
      <span class="btn-hint">přehrát znovu</span>
    </button>
  </div>
</div>

<div id="version">v1.0</div>
<div id="fade"></div>

<script>
// ── STARFIELD CANVAS ─────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
window.addEventListener('resize', resize);
resize();

const STARS = Array.from({ length: 220 }, () => ({
  x: Math.random(), y: Math.random(),
  s: Math.random() * 1.4 + 0.2,
  a: Math.random() * 0.7 + 0.15,
  v: Math.random() * 0.00008 + 0.00002,
}));

function drawBg() {
  ctx.fillStyle = '#000008';
  ctx.fillRect(0, 0, W, H);
  STARS.forEach(s => {
    s.y += s.v;
    if (s.y > 1) { s.y = 0; s.x = Math.random(); }
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.s, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,220,180,${s.a})`;
    ctx.fill();
  });

  // subtle orange nebula glow bottom
  const g = ctx.createRadialGradient(W * 0.5, H, 0, W * 0.5, H, H * 0.65);
  g.addColorStop(0, 'rgba(255,80,20,0.07)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

(function loop() { drawBg(); requestAnimationFrame(loop); })();

// ── PLAYER STATE ─────────────────────────────────────────────────────────────
const savedPlayer = localStorage.getItem('vr_player');
const btnContinue = document.getElementById('btn-continue');
const continueHint = document.getElementById('continue-hint');

if (savedPlayer) {
  try {
    const p = JSON.parse(savedPlayer);
    continueHint.textContent = p.name ? `pilot: ${p.name}` : 'načíst posledního pilota';
  } catch(e) {}
} else {
  btnContinue.classList.add('disabled');
  continueHint.textContent = 'žádný uložený pilot';
}

// ── NAVIGATION ───────────────────────────────────────────────────────────────
function fadeTo(url) {
  const fade = document.getElementById('fade');
  fade.style.transition = 'opacity 0.7s ease';
  fade.classList.add('black');
  setTimeout(() => { window.location.href = url; }, 750);
}

document.getElementById('btn-new').addEventListener('click', () => {
  localStorage.removeItem('vr_player');
  fadeTo('onboarding.html');
});

btnContinue.addEventListener('click', () => {
  fadeTo('index.html');
});

document.getElementById('btn-intro').addEventListener('click', () => {
  localStorage.removeItem('vr_intro_seen');
  fadeTo('intro.html');
});

// ── ENTRANCE ANIMATION ───────────────────────────────────────────────────────
const fade = document.getElementById('fade');
fade.classList.add('clear');

setTimeout(() => {
  document.getElementById('title-wrap').classList.add('show');
  document.getElementById('divider').classList.add('show');
}, 300);

setTimeout(() => {
  document.getElementById('menu-wrap').classList.add('show');
}, 600);
</script>
</body>
</html>
